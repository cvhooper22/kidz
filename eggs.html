<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Egg Hunt Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
        }

        .egg-count {
            background: #FF6B6B;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-right: 12px;
        }

        .reset-btn {
            background: #444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
        }

        .reset-btn:active {
            background: #333;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1a1a1a;
        }

        #zoomCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center;
            align-items: flex-end;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }

        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #FF6B6B;
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #FF6B6B;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.2s;
        }

        .btn-primary {
            background: #FF6B6B;
            color: white;
            flex: 1;
        }

        .btn-primary:active {
            background: #E55555;
        }

        .btn-secondary {
            background: #eee;
            color: #333;
        }

        .btn-secondary:active {
            background: #ddd;
        }

        .egg-list {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: white;
            z-index: 90;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .egg-list.open {
            display: block;
            transform: translateX(0);
        }

        .list-header {
            background: #FF6B6B;
            color: white;
            padding: 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-list-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .egg-items {
            padding: 12px;
        }

        .egg-item {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #FF6B6B;
        }

        .egg-item-type {
            display: inline-block;
            background: #e8e8e8;
            color: #666;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .egg-item-type.plastic {
            background: #B3E5FC;
            color: #0277BD;
        }

        .egg-item-type.hardboiled {
            background: #FFE0B2;
            color: #E65100;
        }

        .egg-item-desc {
            font-size: 14px;
            color: #333;
            font-weight: 500;
            word-break: break-word;
        }

        .egg-item-delete {
            display: block;
            background: none;
            border: none;
            color: #999;
            font-size: 12px;
            margin-top: 8px;
            cursor: pointer;
            text-decoration: underline;
        }

        .list-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #FF6B6B;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
            touch-action: manipulation;
        }

        .list-btn:active {
            background: #E55555;
        }

        .instructions {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            z-index: 80;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .instructions.show {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .egg-list {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥚 Egg Hunt</h1>
            <div class="egg-count" id="eggCount">0 eggs</div>
            <button class="reset-btn" onclick="resetAll()">Reset</button>
        </div>
        <div class="canvas-container">
            <canvas id="zoomCanvas"></canvas>
            <div class="instructions" id="instructions">Tap to place egg</div>
        </div>
    </div>

    <button class="list-btn" id="listBtn">📋</button>

    <div class="egg-list" id="eggList">
        <div class="list-header">
            <span>Placed Eggs</span>
            <button class="close-list-btn" onclick="toggleList()">×</button>
        </div>
        <div class="egg-items" id="eggItems"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Add Egg Details</h2>
            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" placeholder="e.g., under the tree, by fence" maxlength="100">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="isHardBoiled">
                <label for="isHardBoiled">Hard boiled egg</label>
            </div>
            <div class="button-group">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEgg()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('zoomCanvas');
        const ctx = canvas.getContext('2d');
        
        const EXAMPLE_URL = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyMCIgaGVpZ2h0PSIxMDgwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxkZWZzPjxmaWx0ZXIgaWQ9ImEiIHg9Ii0uMDUiIHk9Ii0uMDUiIHdpZHRoPSIxLjEiIGhlaWdodD0iMS4xIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjkiIG51bU9jdGF2ZXM9IjQiIHNlZWQ9IjIiLz48ZmVDb2xvck1hdHJpeCB0eXBlPSJzYXR1cmF0ZSIgdmFsdWVzPSIuOCIvPjwvZmlsdGVyPjwvZGVmcz48cmVjdCB3aWR0aD0iMTkyMCIgaGVpZ2h0PSI0NTAiIGZpbGw9IiM3ZWEzOTkiIGZpbHRlcj0idXJsKCNhKSIvPjxyZWN0IHk9IjQ1MCIgd2lkdGg9IjE5MjAiIGhlaWdodD0iNjMwIiBmaWxsPSIjNTY3ZjFkIi8+PHBhdGggZD0iTTEwMDAgMjAwIEw5NTAgNDAwIEwxMDUwIDQwMCBaIiBmaWxsPSIjM2EyNjE0Ii8+PHBhdGggZD0iTTk2MCAxOTAgTDkyMCAzNjAgTDEwMDAgMzYwIFoiIGZpbGw9IiMzYzJhMTYiLz48cmVjdCB4PSI2MCIgeT0iNTAwIiB3aWR0aD0iMTAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iIzdjNjA0NSIvPjxyZWN0IHg9IjEwMCIgeT0iNDgwIiB3aWR0aD0iNjAiIGhlaWdodD0iMjIwIiBmaWxsPSIjNjY0NDMwIi8+PHJlY3QgeD0iMTIwIiB5PSI1MTAiIHdpZHRoPSIyMCIgaGVpZ2h0PSI0MCIgZmlsbD0iIzMzMyIvPjxyZWN0IHg9IjE0MCIgeT0iNTEwIiB3aWR0aD0iMjAiIGhlaWdodD0iNDAiIGZpbGw9IiMzMzMiLz48Y2lyY2xlIGN4PSI0MzAiIGN5PSI1NDAiIHI9IjE2MCIgZmlsbD0iIzIyNzAyOCIvPjxjaXJjbGUgY3g9IjQyMCIgY3k9IjUyMCIgcj0iMTIwIiBmaWxsPSIjMjg4YzMwIi8+PHBhdGggZD0iTTQyMCAzNDAgTDQwMCAzNDAgTDQwMCAzNjAgTDQyMCAzNjAgWiBNNDQwIDM0MCBMNDIwIDM0MCBMNDIwIDM2MCBMNDQwIDM2MCBaIiBmaWxsPSIjOEE0NTEzIi8+PGNpcmNsZSBjeD0iODAwIiBjeT0iNDYwIiByPSI5MCIgZmlsbD0iIzJhYzAyOCIvPjxjaXJjbGUgY3g9IjgxMCIgY3k9IjQ0MCIgcj0iNjAiIGZpbGw9IiMzMGQ2MzAiLz48cGF0aCBkPSJNMTQwMCA1MDAgTDE0NTAgMzUwIEwxNTAwIDUwMCBaIiBmaWxsPSIjMjI0NzJmIi8+PHJlY3QgeD0iMTQyMCIgeT0iNTAwIiB3aWR0aD0iNjAiIGhlaWdodD0iMTcwIiBmaWxsPSIjOWE2NTMwIi8+PHJlY3QgeD0iMTIwMCIgeT0iNjUwIiB3aWR0aD0iNTAwIiBoZWlnaHQ9IjQiIGZpbGw9IiM0NDQiLz48Y2lyY2xlIGN4PSI2MjAiIGN5PSI0NTAiIHI9IjEwMCIgZmlsbD0iIzI0NTAyZiIvPjxyZWN0IHg9IjU4MCIgeT0iNTQ1IiB3aWR0aD0iODAiIGhlaWdodD0iOSIgZmlsbD0iIzQ0NyIvPjwvc3ZnPg==';
        const IMAGE_URL = './yard.png';
        let image = new Image();
        let eggs = [];
        let pendingEggPosition = null;
        let zoom = 1;
        let panX = 0;
        let panY = 0;
        let lastDistance = 0;

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            draw();
        }

        function loadImage() {
            image.onload = () => {
                resizeCanvas();
            };
            image.onerror = () => {
                console.error('Image failed to load');
                image = { width: 1920, height: 1080, complete: true };
                resizeCanvas();
            };
            image.src = IMAGE_URL;
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!image || !image.complete || !image.naturalWidth) return;

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(zoom, zoom);
            ctx.translate(-image.width / 2 + panX / zoom, -image.height / 2 + panY / zoom);
            
            ctx.drawImage(image, 0, 0, image.width, image.height);
            
            ctx.restore();

            drawMarkers();
        }

        function drawMarkers() {
            eggs.forEach((egg, index) => {
                const screenPos = canvasToScreen(egg.x, egg.y);
                if (!screenPos) return;

                const size = 20;
                ctx.fillStyle = egg.isHardBoiled ? '#FF6F00' : '#0288D1';
                ctx.beginPath();
                ctx.arc(screenPos.x, screenPos.y, size, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(index + 1, screenPos.x, screenPos.y);
            });
        }

        function canvasToScreen(x, y) {
            const screenX = canvas.width / 2 + (x - image.width / 2 + panX / zoom) * zoom;
            const screenY = canvas.height / 2 + (y - image.height / 2 + panY / zoom) * zoom;
            return { x: screenX, y: screenY };
        }

        function screenToCanvas(screenX, screenY) {
            const relX = (screenX - canvas.width / 2) / zoom;
            const relY = (screenY - canvas.height / 2) / zoom;
            const x = image.width / 2 - panX / zoom + relX;
            const y = image.height / 2 - panY / zoom + relY;
            return { x, y };
        }

        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('wheel', handleWheel, { passive: false });

        let touchStartDist = 0;
        let touchStartZoom = 1;

        function handleTouchStart(e) {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                touchStartDist = Math.sqrt(dx * dx + dy * dy);
                touchStartZoom = zoom;
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                zoom = touchStartZoom * (dist / touchStartDist);
                zoom = Math.max(0.5, Math.min(zoom, 5));
                draw();
            } else if (e.touches.length === 1) {
                if (lastDistance) {
                    const deltaX = e.touches[0].clientX - lastX;
                    const deltaY = e.touches[0].clientY - lastY;
                    panX -= deltaX / zoom;
                    panY -= deltaY / zoom;
                    draw();
                }
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                lastDistance = 1;
            }
        }

        function handleTouchEnd(e) {
            lastDistance = 0;
        }

        let lastX = 0, lastY = 0;

        function handleWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            zoom *= delta;
            zoom = Math.max(0.5, Math.min(zoom, 5));
            draw();
        }

        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            const pos = screenToCanvas(screenX, screenY);
            
            pendingEggPosition = pos;
            document.getElementById('description').value = '';
            document.getElementById('isHardBoiled').checked = false;
            document.getElementById('modal').classList.add('active');
            document.getElementById('description').focus();
        }

        function saveEgg() {
            if (!pendingEggPosition) return;
            
            const description = document.getElementById('description').value.trim();
            const isHardBoiled = document.getElementById('isHardBoiled').checked;
            
            eggs.push({
                x: pendingEggPosition.x,
                y: pendingEggPosition.y,
                description: description || 'Unmarked egg',
                isHardBoiled: isHardBoiled
            });
            
            saveToLocalStorage();
            closeModal();
            updateEggCount();
            updateEggList();
            draw();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            pendingEggPosition = null;
        }

        function deleteEgg(index) {
            eggs.splice(index, 1);
            saveToLocalStorage();
            updateEggCount();
            updateEggList();
            draw();
        }

        function saveToLocalStorage() {
            localStorage.setItem('easterEggs', JSON.stringify(eggs));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('easterEggs');
            if (saved) {
                eggs = JSON.parse(saved);
                updateEggCount();
                updateEggList();
                draw();
            }
        }

        function updateEggCount() {
            document.getElementById('eggCount').textContent = `${eggs.length} egg${eggs.length !== 1 ? 's' : ''}`;
        }

        function updateEggList() {
            const listDiv = document.getElementById('eggItems');
            listDiv.innerHTML = '';
            
            eggs.forEach((egg, index) => {
                const item = document.createElement('div');
                item.className = 'egg-item';
                item.innerHTML = `
                    <div class="egg-item-type ${egg.isHardBoiled ? 'hardboiled' : 'plastic'}">
                        ${egg.isHardBoiled ? '🟠 Hard Boiled' : '🔵 Plastic'}
                    </div>
                    <div class="egg-item-desc">${egg.description}</div>
                    <button class="egg-item-delete" onclick="deleteEgg(${index})">Delete</button>
                `;
                listDiv.appendChild(item);
            });
        }

        function toggleList() {
            document.getElementById('eggList').classList.toggle('open');
        }

        document.getElementById('listBtn').addEventListener('click', toggleList);

        function resetAll() {
            if (confirm('Are you sure you want to delete all eggs?')) {
                eggs = [];
                localStorage.removeItem('easterEggs');
                updateEggCount();
                updateEggList();
                draw();
            }
        }

        window.addEventListener('resize', resizeCanvas);
        
        loadImage();
        loadFromLocalStorage();
    </script>
</body>
</html>
